<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- ============== Google Inter Font ============== -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;500;700&display=swap" rel="stylesheet">
    <title>Survey-Form</title>
    <!-- ================= Style ================= -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- =============== Main ============== -->
    <main id="main">

        <!-- =============== Form Coontainer ============ -->
        <div class="form-container">

            <!-- =========== Form Header ============= -->
            <header class="form-header">

                <h1 id="title">Student Admission Survey</h1>
                <p id="description">
                    please enter all your information to validate your admission
                </p>

            </header>

            <!-- ================ Survey-form ============== -->
            <form action="#" id="survey-form">

                <!-- ============== field Name ============= -->
                <div class="field">

                    <label for="name" id="name-label" class="label-required">Name</label>
                    <input type="text" name="name" id="name" placeholder="Enter your name" required autocomplete="off">

                </div>

                <!-- ============== field Email ============= -->
                <div class="field">

                    <label for="email" id="email-label" class="label-required">Email</label>
                    <input type="email" name="email" id="email" placeholder="Enter your Email" required
                        autocomplete="off">

                </div>

                <!-- ============== field Age ============= -->
                <div class="field">

                    <label for="number" id="number-label" class="label-required">Age (between 18 and 29 years
                        old)</label>
                    <input type="number" name="number" id="number" placeholder="Enter your Age" required
                        autocomplete="off" min="18" max="29">

                </div>

                <!-- ========== Dropdown field =================== -->
                <div class="field">
                    <label>Select your profession</label>
                    <div class="dropdown">
                        <select name="profession" id="dropdown">
                            <option id="ui-ux" value="ui-ux designer">UI/UX Designer</option>
                            <option id="frontend" value="frontend">Frontend Developer</option>
                            <option id="backend" value="backend">Backend Developper</option>
                            <option id="fullstack" value="fullstack">FullStack Developer</option>
                        </select>
                        <div class="icon"></div>
                    </div>

                </div>

                <!-- ============== field Radio ============= -->
                <div class="field">

                    <label>Select your Gender</label>

                    <!-- <div class="gender"> -->
                        <div class="gender-field">
                            <div class="input">
                                <input type="radio" name="gender" id="male" value="male">
                                <label for="male" class="radio"></label>
                            </div>
                            <label for="male">Male</label>
                        </div>

                        <div class="gender-field">
                            <div class="input">
                                <input type="radio" name="gender" id="female" value="female">
                                <label for="female" class="radio"></label>
                            </div>
                            <label for="female">Female</label>
                        </div>
                    <!-- </div> -->


                </div>

                <!-- ============= Checkboxes field ================ -->
                <div class="field">

                    <label id="languages">Select your Favotite(s) Language(s)</label>

                    <div class="language-field">
                        <div class="input">
                            <input type="checkbox" name="java" id="java" value="java">
                            <label class="box" for="java">
                                <svg version="1.1" x="0px" y="0px" viewBox="0 0 512 512"
                                    style="enable-background:new 0 0 512 512;" xml:space="preserve">
                                    <path
                                        d="M504.502,75.496c-9.997-9.998-26.205-9.998-36.204,0L161.594,382.203L43.702,264.311c-9.997-9.998-26.205-9.997-36.204,0c-9.998,9.997-9.998,26.205,0,36.203l135.994,135.992c9.994,9.997,26.214,9.99,36.204,0L504.502,111.7C514.5,101.703,514.499,85.494,504.502,75.496z" />
                                </svg>
                            </label>
                        </div>
                        <label for="java">JAVA</label>
                    </div>

                    <div class="language-field">
                        <div class="input">
                            <input type="checkbox" name="javascript" id="javascript" value="javascript">
                            <label class="box" for="javascript">
                                <svg version="1.1" x="0px" y="0px" viewBox="0 0 512 512"
                                    style="enable-background:new 0 0 512 512;" xml:space="preserve">
                                    <path
                                        d="M504.502,75.496c-9.997-9.998-26.205-9.998-36.204,0L161.594,382.203L43.702,264.311c-9.997-9.998-26.205-9.997-36.204,0c-9.998,9.997-9.998,26.205,0,36.203l135.994,135.992c9.994,9.997,26.214,9.99,36.204,0L504.502,111.7C514.5,101.703,514.499,85.494,504.502,75.496z" />
                                </svg>
                            </label>
                        </div>
                        <label for="javascript">JAVASCRIPT</label>
                    </div>

                    <div class="language-field">
                        <div class="input">
                            <input type="checkbox" name="python" id="python" value="python">
                            <label class="box" for="python">
                                <svg version="1.1" x="0px" y="0px" viewBox="0 0 512 512"
                                    style="enable-background:new 0 0 512 512;" xml:space="preserve">
                                    <path
                                        d="M504.502,75.496c-9.997-9.998-26.205-9.998-36.204,0L161.594,382.203L43.702,264.311c-9.997-9.998-26.205-9.997-36.204,0c-9.998,9.997-9.998,26.205,0,36.203l135.994,135.992c9.994,9.997,26.214,9.99,36.204,0L504.502,111.7C514.5,101.703,514.499,85.494,504.502,75.496z" />
                                </svg>
                            </label>
                        </div>
                        <label for="python">PYTHON</label>
                    </div>

                    <div class="language-field">
                        <div class="input">
                            <input type="checkbox" name="c-sharp" id="c-sharp" value="c-sharp">
                            <label class="box" for="c-sharp">
                                <svg version="1.1" x="0px" y="0px" viewBox="0 0 512 512"
                                    style="enable-background:new 0 0 512 512;" xml:space="preserve">
                                    <path
                                        d="M504.502,75.496c-9.997-9.998-26.205-9.998-36.204,0L161.594,382.203L43.702,264.311c-9.997-9.998-26.205-9.997-36.204,0c-9.998,9.997-9.998,26.205,0,36.203l135.994,135.992c9.994,9.997,26.214,9.99,36.204,0L504.502,111.7C514.5,101.703,514.499,85.494,504.502,75.496z" />
                                </svg>
                            </label>
                        </div>
                        <label for="c-sharp">C-SHARP</label>
                    </div>

                </div>

                <!-- ============== field Comments ============= -->
                <div class="field">

                    <label for="comments" id="comments-label">Any comments or suggestions?</label>
                    <textarea name="comments" id="comments" cols="30" rows="6"
                        placeholder="Enter your comments here"></textarea>

                </div>

                <!-- ============ Submit button ============ -->
                <button id="submit">Submit</button>

            </form>
        </div>

    </main>


    <!-- ================= script test ====================== -->
    <script src="https://cdn.freecodecamp.org/testable-projects-fcc/v1/bundle.js"></script>
</body>

</html>
